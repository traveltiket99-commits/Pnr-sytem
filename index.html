<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek PNR</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f7;
}

.header {
  background: #1e4fa3;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.card {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #2d6cdf;
  color: white;
  border: none;
}

/* RESULT STYLE */
.ticket {
  margin-top: 15px;
  background: #eef3ff;
  padding: 15px;
  border-radius: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

.label {
  color: #555;
}

.value {
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">✈️ CEK BOOKING</div>

<div class="card">
  <h3>Cek Kode PNR</h3>

  <input id="pnr" placeholder="Masukkan Kode PNR">
  <button onclick="cekPNR()">Cek Booking</button>

  <div id="result"></div>
</div>

<script>

// DATA PENUMPANG (STATIC - seperti database maskapai)
const dataPNR = {
  "ABC123": {
    name: "Budi Santoso",
    flight: "JT-610",
    from: "Jakarta",
    to: "Surabaya",
    date: "10 April 2026",
    seat: "12A",
    status: "Confirmed"
  },
  "XYZ789": {
    name: "Siti Aminah",
    flight: "GA-205",
    from: "Jakarta",
    to: "Bali",
    date: "12 April 2026",
    seat: "7C",
    status: "Confirmed"
  }
};

// CEK PNR
function cekPNR() {
  const pnr = document.getElementById("pnr").value.toUpperCase();
  const data = dataPNR[pnr];

  if (data) {
    document.getElementById("result").innerHTML = `
      <div class="ticket">
        <div class="row"><span class="label">Nama</span><span class="value">${data.name}</span></div>
        <div class="row"><span class="label">PNR</span><span class="value">${pnr}</span></div>
        <div class="row"><span class="label">Flight</span><span class="value">${data.flight}</span></div>
        <div class="row"><span class="label">Rute</span><span class="value">${data.from} → ${data.to}</span></div>
        <div class="row"><span class="label">Tanggal</span><span class="value">${data.date}</span></div>
        <div class="row"><span class="label">Seat</span><span class="value">${data.seat}</span></div>
        <div class="row"><span class="label">Status</span><span class="value">${data.status}</span></div>
      </div>
    `;
  } else {
    document.getElementById("result").innerHTML =
      "<div class='ticket'>PNR tidak ditemukan</div>";
  }
}

</script>

</body>
</html>
