<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight PNR Checker</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://cdn.pixabay.com/photo/2016/11/29/09/32/aircraft-1867121_1280.jpg');
    background-size: cover;
    background-position: center;
}

/* HEADER */
.header {
    text-align: center;
    color: white;
    font-size: 26px;
    font-weight: bold;
    padding: 20px;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

/* CARD */
.card {
    width: 360px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    color: white;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #e60000;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

/* RESULT */
.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.label {
    font-size: 12px;
    color: #ddd;
}

.value {
    font-weight: bold;
}

/* STATUS */
.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.green { background: #00ff88; color: black; }
.orange { background: orange; color: black; }
.red { background: red; color: white; }

.loading {
    text-align: center;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="header">✈️ Flight PNR Checker</div>

<div class="container">
<div class="card">

<input id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cek()">Cek Tiket</button>

<div id="hasil"></div>

</div>
</div>

<script>

/* DATABASE TIKET */
const data = {

/* DATA LION AIR (TIKET GAMBAR) */
"JQKLZA": {
nama: "ARTHUR CHRISTIAN",
maskapai: "Lion Air",
flight: "JT-215",
dari: "KNO (Medan)",
ke: "CGK (Jakarta)",
jam: "18:30 - 20:50",
tanggal: "08 April 2026",
durasi: "2j 20m",
bagasi: "20kg",
kelas: "Ekonomi",
status: "Confirmed"
},

/* DATA KAMU */
"TYW44R": {
nama: "FRANSISCUS SAHAT MAROLOP S",
maskapai: "Super Air Jet",
flight: "IU-949",
dari: "KNO (Medan)",
ke: "CGK (Jakarta)",
jam: "19:00 - 21:25",
tanggal: "08 April 2026",
durasi: "2j 25m",
seat: "15A",
status: "Menunggu Pembayaran"
}

};

/* FUNCTION CEK */
function cek(){
let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

h.innerHTML = `<div class="loading">⏳ Mengecek tiket...</div>`;

setTimeout(() => {

if(data[pnr]){
let d = data[pnr];

let warna = "green";
if(d.status == "Menunggu Pembayaran") warna = "orange";
if(d.status == "Dibatalkan") warna = "red";

h.innerHTML = `
<div class="result">

<div class="grid">
<div><div class="label">Nama</div><div class="value">${d.nama}</div></div>
<div><div class="label">Maskapai</div><div class="value">${d.maskapai}</div></div>

<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Tanggal</div><div class="value">${d.tanggal}</div></div>

<div><div class="label">Dari</div><div class="value">${d.dari}</div></div>
<div><div class="label">Ke</div><div class="value">${d.ke}</div></div>

<div><div class="label">Jam</div><div class="value">${d.jam}</div></div>
<div><div class="label">Durasi</div><div class="value">${d.durasi}</div></div>
</div>

<br>

<div class="grid">
${d.seat ? `<div><div class="label">Seat</div><div class="value">${d.seat}</div></div>` : ""}
${d.bagasi ? `<div><div class="label">Bagasi</div><div class="value">${d.bagasi}</div></div>` : ""}
${d.kelas ? `<div><div class="label">Kelas</div><div class="value">${d.kelas}</div></div>` : ""}
</div>

<br>

<div>
<div class="label">Status</div>
<span class="badge ${warna}">${d.status}</span>
</div>

</div>
`;

}else{

h.innerHTML = `
<div class="result" style="color:red;">
❌ PNR tidak ditemukan
</div>
`;

}

}, 800);
}

</script>

</body>
</html>
