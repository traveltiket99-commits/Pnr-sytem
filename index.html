<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight PNR Checker</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://cdn.pixabay.com/photo/2016/11/29/09/32/aircraft-1867121_1280.jpg');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.header {
    text-align: center;
    color: white;
    font-size: 24px;
    font-weight: bold;
    padding: 20px;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.card {
    width: 360px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    color: white;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #e60000;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.label {
    font-size: 12px;
    color: #ddd;
}

.value {
    font-weight: bold;
}

.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.green { background: #00ff88; color: black; }

.loading {
    text-align: center;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="header">✈️ Flight PNR Checker</div>

<div class="container">
<div class="card">

<input id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>
</div>

<script>

const data = {

"ABC123": {
nama: "Budi Santoso",
maskapai: "Lion Air",
flight: "JT-610",
dari: "CGK (Jakarta)",
ke: "DPS (Bali)",
jam: "08:30",
status: "Confirmed"
},

"XYZ789": {
nama: "Andi Saputra",
maskapai: "Garuda Indonesia",
flight: "GA-200",
dari: "CGK (Jakarta)",
ke: "SUB (Surabaya)",
jam: "13:45",
status: "Confirmed"
},

"QWE456": {
nama: "Siti Aminah",
maskapai: "AirAsia",
flight: "AK-101",
dari: "KUL (Malaysia)",
ke: "CGK (Jakarta)",
jam: "17:20",
status: "Confirmed"
},

"JQKZUE": {
nama: "Ny. Tiara Monova",
maskapai: "Super Air Jet",
flight: "IU-960",
dari: "BTH (Batam)",
ke: "DTB (Siborong-borong)",
jam: "10:20",
status: "Confirmed"
},

"JHUWEA": {
nama: "Ny. Romauli Rajagukguk",
maskapai: "Citilink",
flight: "QG-884",
dari: "CGK (Jakarta)",
ke: "DTB (Silangit)",
jam: "06:45",
status: "Confirmed"
},

// ✅ DATA BARU YANG KAMU MINTA
"G5PDZT": {
nama: "Sdr. Sakkot Parhat Harahap",
maskapai: "TransNusa / Pelita Air",
flight: "8B-5532 / IP-647",
dari: "CGK (Jakarta)",
ke: "BPN (Balikpapan)",
jam: "16:05 - 11:25",
status: "Hold (Menunggu Pembayaran)"
}

};

function cek(){

let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

h.innerHTML = `<div class="loading">⏳ Mengecek data...</div>`;

setTimeout(() => {

if(data[pnr]){

let d = data[pnr];

h.innerHTML = `
<div class="result">

<div class="grid">
<div><div class="label">Nama</div><div class="value">${d.nama}</div></div>
<div><div class="label">Maskapai</div><div class="value">${d.maskapai}</div></div>
<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Jam</div><div class="value">${d.jam}</div></div>
<div><div class="label">Dari</div><div class="value">${d.dari}</div></div>
<div><div class="label">Ke</div><div class="value">${d.ke}</div></div>
</div>

<br>

<div>
<div class="label">Status</div>
<span class="badge green">${d.status}</span>
</div>

</div>
`;

}else{

h.innerHTML = `
<div class="result" style="color:red;">
PNR tidak ditemukan
</div>
`;

}

}, 800);

}

</script>

</body>
</html>
