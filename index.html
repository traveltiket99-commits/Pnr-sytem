<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight PNR Checker</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://cdn.pixabay.com/photo/2016/11/29/09/32/aircraft-1867121_1280.jpg');
    background-size: cover;
}

.header {
    text-align: center;
    color: white;
    font-size: 24px;
    padding: 20px;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 350px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: white;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

button {
    background: red;
    color: white;
    font-weight: bold;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
}

.flight {
    margin-top: 10px;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
}

.badge {
    background: #00ff88;
    padding: 5px 10px;
    border-radius: 10px;
    color: black;
}
</style>
</head>

<body>

<div class="header">✈️ Flight PNR Checker</div>

<div class="container">
<div class="card">

<input id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>
</div>

<script>

// ✅ DATA SUDAH BENAR
const data = {
"LD13ZN": {
nama: "Tn. Saiful Bahri",
maskapai: "Batik Air",
status: "Confirmed",
kelas: "Ekonomi",
bagasi: "20 kg",
transit: "2j 50m di Jakarta",
penerbangan: [
{
flight: "ID-6257",
dari: "AAP (Samarinda)",
ke: "CGK (Jakarta)",
jam: "13:00 - 14:10"
},
{
flight: "ID-6576",
dari: "CGK (Jakarta)",
ke: "SUB (Surabaya)",
jam: "17:00 - 18:30"
}
]
}
};

function cek(){

let pnr = document.getElementById("pnr").value.toUpperCase().trim();
let hasil = document.getElementById("hasil");

if(data[pnr]){

let d = data[pnr];

let html = `
<div class="result">
<b>Nama:</b> ${d.nama}<br>
<b>Maskapai:</b> ${d.maskapai}<br>
<b>Status:</b> <span class="badge">${d.status}</span><br>
<b>Kelas:</b> ${d.kelas}<br>
<b>Bagasi:</b> ${d.bagasi}<br><br>
`;

d.penerbangan.forEach(f => {
html += `
<div class="flight">
<b>${f.flight}</b><br>
${f.dari} ➝ ${f.ke}<br>
${f.jam}
</div>
`;
});

html += `<br><b>Transit:</b> ${d.transit}</div>`;

hasil.innerHTML = html;

}else{
hasil.innerHTML = `<div class="result" style="color:red;">PNR tidak ditemukan</div>`;
}

}

</script>

</body>
</html>
