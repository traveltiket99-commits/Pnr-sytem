<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight PNR Checker</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://cdn.pixabay.com/photo/2016/11/29/09/32/aircraft-1867121_1280.jpg');

    background-size: cover;
    background-position: center;
}

.header {
    text-align: center;
    color: white;
    font-size: 24px;
    font-weight: bold;
    padding: 20px;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    width: 360px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    color: white;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

button {
    background: #e60000;
    color: white;
    font-weight: bold;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
}

.flight-box {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
}

.badge {
    padding: 6px 12px;
    border-radius: 20px;
    background: #00ff88;
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">✈️ Flight PNR Checker</div>

<div class="container">
<div class="card">

<input id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>
</div>

<script>

const data = {

// DATA LAMA
"ABC123": {
nama: "Budi Santoso",
maskapai: "Lion Air",
flight: "JT-610",
dari: "CGK (Jakarta)",
ke: "DPS (Bali)",
jam: "08:30",
status: "Confirmed"
},

// ✅ DATA BARU (MULTI FLIGHT)
"LD13ZN": {
nama: "Tn. Saiful Bahri",
maskapai: "Batik Air",
status: "Confirmed",
kelas: "Ekonomi",
bagasi: "20 kg",
transit: "2j 50m di Jakarta",

penerbangan: [
{
flight: "ID-6257",
dari: "AAP (Samarinda)",
ke: "CGK (Jakarta)",
jam: "13:00 - 14:10"
},
{
flight: "ID-6576",
dari: "CGK (Jakarta)",
ke: "SUB (Surabaya)",
jam: "17:00 - 18:30"
}
]
}

};

function cek(){

let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

if(data[pnr]){

let d = data[pnr];

let html = `
<div class="result">
<b>Nama:</b> ${d.nama}<br>
<b>Maskapai:</b> ${d.maskapai}<br>
<b>Status:</b> <span class="badge">${d.status}</span><br>
`;

if(d.kelas){
html += `<b>Kelas:</b> ${d.kelas}<br>
<b>Bagasi:</b> ${d.bagasi}<br>`;
}

// MULTI FLIGHT
if(d.penerbangan){
d.penerbangan.forEach(f => {
html += `
<div class="flight-box">
<b>${f.flight}</b><br>
${f.dari} ➝ ${f.ke}<br>
${f.jam}
</div>
`;
});

html += `<br><b>Transit:</b> ${d.transit}`;
}else{
html += `
<b>Flight:</b> ${d.flight}<br>
<b>Dari:</b> ${d.dari}<br>
<b>Ke:</b> ${d.ke}<br>
<b>Jam:</b> ${d.jam}<br>
`;
}

html += `</div>`;

h.innerHTML = html;

}else{
h.innerHTML = `<div class="result" style="color:red;">PNR tidak ditemukan</div>`;
}

}

</script>

</body>
</html>
