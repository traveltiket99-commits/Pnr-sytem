<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boarding Pass</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f7;
}

.header {
  background: #1e4fa3;
  color: white;
  text-align: center;
  padding: 15px;
  font-weight: bold;
}

.card {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 16px;
  text-transform: uppercase;
}

button {
  width: 100%;
  padding: 12px;
  background: #2d6cdf;
  color: white;
  border: none;
}

/* BOARDING PASS */
.ticket {
  margin-top: 20px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.top {
  background: linear-gradient(90deg,#ff6a00,#ff8c00);
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.middle {
  padding: 15px;
  background: #fff;
}

.route {
  display: flex;
  justify-content: space-between;
  font-size: 20px;
  font-weight: bold;
}

.info {
  margin-top: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

.bottom {
  background: #eee;
  padding: 10px;
  text-align: center;
  letter-spacing: 2px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">✈️ CEK BOOKING</div>

<div class="card">
  <h3>Cek Kode PNR</h3>
  <input id="pnr" placeholder="Masukkan Kode PNR">
  <button onclick="cekPNR()">Cek Booking</button>

  <div id="result"></div>
</div>

<script>

const dataPNR = {
  "ABC123": {
    name: "Budi Santoso",
    flight: "JT-610",
    from: "Jakarta",
    to: "Surabaya",
    date: "10 April 2026",
    seat: "12A",
    status: "CONFIRMED"
  }
};

function cekPNR() {
  const pnr = document.getElementById("pnr").value.toUpperCase().trim();
  const data = dataPNR[pnr];

  if (data) {
    document.getElementById("result").innerHTML = `
      <div class="ticket">

        <div class="top">
          <div>${data.flight}</div>
          <div>${data.status}</div>
        </div>

        <div class="middle">
          <b>${data.name}</b><br>
          PNR: ${pnr}

          <div class="route">
            <div>${data.from}</div>
            <div>→</div>
            <div>${data.to}</div>
          </div>

          <div class="info">
            <div class="row">
              <div>Tanggal</div>
              <div>${data.date}</div>
            </div>
            <div class="row">
              <div>Seat</div>
              <div>${data.seat}</div>
            </div>
          </div>
        </div>

        <div class="bottom">
          |||||||||||||||||||||||||||||||
        </div>

      </div>
    `;
  } else {
    document.getElementById("result").innerHTML =
      "<div class='ticket'>PNR tidak ditemukan</div>";
  }
}

</script>

</body>
</html>
