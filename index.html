<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight PNR Checker</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

.box {
    margin:20px;
    padding:20px;
    border-radius:25px;
    background:#111;
    box-shadow:0 0 30px rgba(255,0,0,0.2);
}

.title {
    text-align:center;
    font-size:22px;
    margin-bottom:10px;
}

.desc {
    text-align:center;
    color:#aaa;
    font-size:14px;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    background:#222;
    color:#fff;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:red;
    color:white;
    font-weight:bold;
    font-size:16px;
}

.result {
    margin-top:20px;
    display:none;
    background:#1a1a1a;
    border-radius:20px;
    padding:20px;
}

.row {
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.label {
    font-size:12px;
    color:#aaa;
}

.value {
    font-weight:bold;
}

.route {
    text-align:center;
    margin:15px 0;
    font-size:18px;
}

.status {
    margin-top:15px;
    text-align:center;
    padding:12px;
    border-radius:20px;
    font-weight:bold;
}

.timer {
    margin-top:10px;
    text-align:center;
    color:#ff3b30;
    font-size:14px;
}

.info {
    text-align:center;
    font-size:13px;
    color:#aaa;
}

.qr {
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

<div class="title">✈️ Flight PNR Checker</div>

<p class="desc">
Cek status penerbangan Anda dengan mudah menggunakan kode PNR
</p>

<input type="text" id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cekPNR()">Cek Status</button>

<div class="result" id="result"></div>

</div>

<script>

// DATABASE
const db = {

"Q7X9PL": {
    nama:"Tn. Robinson Analalo",
    maskapai:"Batik Air",
    flight:"ID-6324",
    dari:"Denpasar (DPS)",
    ke:"Tambolaka (TMC)",
    jam:"09:10 - 10:25",
    boarding:"08:40",
    gate:"3",
    seat:"12A",
    total:"Rp 835.022",
    etiket:"6723458912345",
    class:"Economy",
    bagasi:"20 Kg",

    status:"Pending Payment"
}

};


// CEK PNR
function cekPNR(){
    let input = document.getElementById("pnr").value.toUpperCase();
    let result = document.getElementById("result");

    if(db[input]){
        let d = db[input];

        result.innerHTML = `
        
        <div style="text-align:center; margin-bottom:10px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Batik_Air_logo.svg/512px-Batik_Air_logo.svg.png" width="120">
        </div>

        <div class="row">
            <div>
                <div class="label">Nama</div>
                <div class="value">${d.nama}</div>
            </div>
            <div>
                <div class="label">Maskapai</div>
                <div class="value">${d.maskapai}</div>
            </div>
        </div>

        <div class="route">
            ${d.dari} ✈ ${d.ke}
        </div>

        <div class="row">
            <div>
                <div class="label">Flight</div>
                <div class="value">${d.flight}</div>
            </div>
            <div>
                <div class="label">Jam</div>
                <div class="value">${d.jam}</div>
            </div>
        </div>

        <div class="row">
            <div>
                <div class="label">Gate</div>
                <div class="value">${d.gate}</div>
            </div>
            <div>
                <div class="label">Seat</div>
                <div class="value">${d.seat}</div>
            </div>
        </div>

        <div class="row">
            <div>
                <div class="label">Boarding</div>
                <div class="value">${d.boarding}</div>
            </div>
            <div>
                <div class="label">Total</div>
                <div class="value">${d.total}</div>
            </div>
        </div>

        <div class="row">
            <div>
                <div class="label">E-Ticket</div>
                <div class="value">${d.etiket}</div>
            </div>
            <div>
                <div class="label">Class</div>
                <div class="value">${d.class}</div>
            </div>
        </div>

        <div class="row">
            <div>
                <div class="label">Bagasi</div>
                <div class="value">${d.bagasi}</div>
            </div>
        </div>

        <div class="status" id="statusBox"></div>

        <div class="timer" id="timer"></div>

        <div class="info">
        Segera lakukan pembayaran sebelum waktu habis
        </div>

        <div class="qr">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${input}">
        </div>
        `;

        result.style.display="block";

        setStatus(d.status);
        start30MinuteTimer();
    } else {
        alert("PNR tidak ditemukan");
    }
}


// STATUS STYLE
function setStatus(status){
    let box = document.getElementById("statusBox");

    if(status === "Confirmed"){
        box.style.background = "#00c853";
        box.style.color = "#fff";
        box.innerHTML = "✔ Confirmed";
    } else {
        box.style.background = "#FFD600";
        box.style.color = "#000";
        box.innerHTML = "⏳ Pending Payment";
    }
}


// TIMER 30 MENIT
function start30MinuteTimer(){
    const display = document.getElementById("timer");

    let duration = 30 * 60; // 30 menit

    const interval = setInterval(() => {

        let m = Math.floor(duration / 60);
        let s = duration % 60;

        display.innerHTML = `⏳ Sisa waktu: ${m}:${s < 10 ? "0"+s : s}`;

        duration--;

        if(duration < 0){
            clearInterval(interval);
            display.innerHTML = "❌ Waktu pembayaran habis";
        }

    },1000);
}


// AUTO SCAN LINK ?pnr=
const urlParams = new URLSearchParams(window.location.search);
const pnr = urlParams.get('pnr');

if (pnr) {
    document.getElementById("pnr").value = pnr;
    setTimeout(() => cekPNR(), 500);
}

</script>

</body>
</html>
