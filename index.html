<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight PNR Checker</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://cdn.pixabay.com/photo/2016/11/29/09/32/aircraft-1867121_1280.jpg');
    background-size: cover;
}

.header {
    text-align: center;
    color: white;
    font-size: 24px;
    padding: 20px;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

.card {
    width: 380px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);
    color: white;
    max-height: 90vh;
    overflow-y: auto;
}

input, button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

button {
    background: #e60000;
    color: white;
    font-weight: bold;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.label { font-size: 12px; color: #ddd; }
.value { font-weight: bold; }

.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.green { background: #00ff88; color: black; }
.orange { background: orange; color: black; }

.timer {
    background: orange;
    color: black;
    text-align: center;
    font-size: 22px;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}

.red { background: red; color: white; }

.loading { text-align: center; margin-top: 15px; }
</style>
</head>

<body>

<div class="header">✈️ Flight PNR Checker</div>

<div class="container">
<div class="card">

<input id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>
</div>

<script>

const data = {

// ✅ SEMUA DATA LAMA KAMU (TIDAK DIHAPUS)
"ABC123": {
nama: "Budi Santoso",
maskapai: "Lion Air",
flight: "JT-610",
dari: "CGK (Jakarta)",
ke: "DPS (Bali)",
jam: "08:30",
status: "Confirmed"
},

"XYZ789": {
nama: "Andi Saputra",
maskapai: "Garuda Indonesia",
flight: "GA-200",
dari: "CGK (Jakarta)",
ke: "SUB (Surabaya)",
jam: "13:45",
status: "Confirmed"
},

"QWE456": {
nama: "Siti Aminah",
maskapai: "AirAsia",
flight: "AK-101",
dari: "KUL (Malaysia)",
ke: "CGK (Jakarta)",
jam: "17:20",
status: "Confirmed"
},

"JQKZUE": {
nama: "Ny. Tiara Monova",
maskapai: "Super Air Jet",
flight: "IU-960",
dari: "BTH (Batam)",
ke: "DTB (Siborong-borong)",
jam: "10:20",
status: "Confirmed"
},

"JHUWEA": {
nama: "Ny. Romauli Rajagukguk",
maskapai: "Citilink",
flight: "QG-884",
dari: "CGK (Jakarta)",
ke: "DTB (Silangit)",
jam: "06:45",
status: "Confirmed"
},

"G5PDZT": {
nama: "Sdr. Sakkot Parhat Harahap",
maskapai: "TransNusa / Pelita Air",
flight: "8B-5532 / IP-647",
dari: "CGK (Jakarta)",
ke: "BPN (Balikpapan)",
jam: "16:05 - 11:25",
status: "Menunggu Pembayaran"
},

"CNIKP8": {
nama: "Ny. Siti Nurmama",
maskapai: "AirAsia",
flight: "AK-491",
dari: "PNK (Pontianak)",
ke: "KUL (Kuala Lumpur)",
jam: "11:05 - 13:45",
status: "Menunggu Pembayaran"
},

"NC3HYR": {
nama: "Sdr. Amiruddin",
maskapai: "Lion Air",
flight: "JT-798",
dari: "UPG (Makassar)",
ke: "DJJ (Jayapura)",
jam: "01:35 - 06:05",
status: "Menunggu Pembayaran"
},

// ✅ DATA BARU (DITAMBAHKAN SAJA)
"SJ6R2K": {
nama: "9 Penumpang",
maskapai: "Sriwijaya Air",
flight: "SJ-598 / SJ-538",
dari: "CGK (Jakarta)",
ke: "MOH (Morowali)",
jam: "22:15 - 09:40",
status: "Menunggu Pembayaran",

penumpang: [
"Aluna Khumairah",
"Sarwia Matta",
"Moh. Hizam",
"Ilham Hasan",
"Fajriah",
"Ilfa Khairunnisa Hasan",
"Diva Salsabilah Hasan",
"Tiara Hafizah Hasan",
"Ana Qoriah Maryam"
],

tanggal: "13-14 April 2026",
total: "Rp 11.448.600"
}

};

let timerInterval;

function cek(){

clearInterval(timerInterval);

let pnr = document.getElementById("pnr").value.toUpperCase().trim();
let h = document.getElementById("hasil");

h.innerHTML = `<div class="loading">⏳ Mengecek data...</div>`;

setTimeout(() => {

if(data[pnr]){

let d = data[pnr];
let warna = d.status.includes("Menunggu") ? "orange" : "green";

let html = `
<div class="result">

<div class="grid">
<div><div class="label">Nama</div><div class="value">${d.nama}</div></div>
<div><div class="label">Maskapai</div><div class="value">${d.maskapai}</div></div>
<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Jam</div><div class="value">${d.jam}</div></div>
<div><div class="label">Dari</div><div class="value">${d.dari}</div></div>
<div><div class="label">Ke</div><div class="value">${d.ke}</div></div>
</div>
`;

// penumpang
if(d.penumpang){
html += `
<div style="margin-top:10px;">
<div class="label">Penumpang</div>
<div class="value">${d.penumpang.join("<br>")}</div>
</div>`;
}

// total
if(d.total){
html += `
<div style="margin-top:10px;">
<div class="label">Total</div>
<div class="value">${d.total}</div>
</div>`;
}

html += `
<br>
<div>
<div class="label">Status</div>
<span class="badge ${warna}">${d.status}</span>
</div>
`;

// timer hanya untuk status menunggu
if(d.status.includes("Menunggu")){
html += `
<div class="timer" id="timer">Loading...</div>

<div style="margin-top:10px;">
<div class="label">Pembayaran</div>
<div class="value">
BRI - SUCI RAHMADINI<br>
370001014122504
</div>
</div>
`;

setTimeout(startTimer,100);
}

html += `</div>`;

h.innerHTML = html;

}else{
h.innerHTML = `<div class="result" style="color:red;">PNR tidak ditemukan</div>`;
}

}, 800);

}

// TIMER JAM 09:00
function startTimer(){

const deadline = new Date();
deadline.setHours(9,0,0,0);

timerInterval = setInterval(()=>{

let now = new Date();
let diff = deadline - now;
let el = document.getElementById("timer");

if(!el) return;

if(diff <= 0){
el.innerHTML = "WAKTU HABIS";
el.classList.add("red");
clearInterval(timerInterval);
return;
}

let h = Math.floor(diff/3600000);
let m = Math.floor((diff%3600000)/60000);
let s = Math.floor((diff%60000)/1000);

el.innerHTML =
String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0');

},1000);
}

</script>

</body>
</html>
