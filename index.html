<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight PNR Checker</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://cdn.pixabay.com/photo/2016/11/29/09/32/aircraft-1867121_1280.jpg');
    background-size: cover;
}

.header {
    text-align: center;
    color: white;
    font-size: 24px;
    padding: 20px;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

.card {
    width: 380px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);
    color: white;
    max-height: 90vh;
    overflow-y: auto;
}

input, button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

button {
    background: #e60000;
    color: white;
    font-weight: bold;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.label { font-size: 12px; color: #ddd; }
.value { font-weight: bold; }

.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.green { background: #00ff88; color: black; }
.orange { background: orange; color: black; }

.timer {
    background: orange;
    color: black;
    text-align: center;
    font-size: 22px;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}

.red { background: red; color: white; }

.loading { text-align: center; margin-top: 15px; }
</style>
</head>

<body>

<div class="header">✈️ Flight PNR Checker</div>

<div class="container">
<div class="card">

<input id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>
</div>

<script>

const data = {

"ABC123": {
nama: "Budi Santoso",
maskapai: "Lion Air",
flight: "JT-610",
dari: "CGK (Jakarta)",
ke: "DPS (Bali)",
jam: "08:30",
status: "Confirmed"
},

"XYZ789": {
nama: "Andi Saputra",
maskapai: "Garuda Indonesia",
flight: "GA-200",
dari: "CGK (Jakarta)",
ke: "SUB (Surabaya)",
jam: "13:45",
status: "Confirmed"
},

"BTK147M": {
nama: "Ny. Isna",
maskapai: "Batik Air",
flight: "ID-6763",
dari: "MDC (Manado)",
ke: "CGK (Jakarta)",
jam: "16:45 - 21:45",
status: "Menunggu Pembayaran",
kelas: "Ekonomi",
bagasi: "20 kg",
tanggal: "14 April 2026",
total: "Rp 2.317.800"
},

"LN1732S": {
nama: "Tn. Sulisyono",
maskapai: "Lion Air",
flight: "JT-898 / JT-944",
dari: "CGK (Jakarta)",
ke: "SOQ (Sorong)",
jam: "01:10 - 14:45",
status: "Menunggu Pembayaran",
penumpang: ["Tn. Sulisyono"],
tanggal: "14 April 2026",
kelas: "Ekonomi",
bagasi: "20 kg",
total: "Rp 1.732.800"
},

// ✅ STATUS SUDAH DIUBAH JADI CONFIRMED
"JHMAUZ": {
nama: "Ny. Muliani",
maskapai: "Batik Air",
flight: "ID-6316",
dari: "PNK (Pontianak)",
ke: "UPG (Makassar)",
jam: "14:55 - 19:20",
status: "Confirmed",

penumpang: ["Ny. Muliani"],

tanggal: "18 April 2026",
kelas: "Ekonomi",
bagasi: "20 kg",
total: "Rp 1.739.900"
}

};

let timerInterval;

function cek(){

clearInterval(timerInterval);

let pnr = document.getElementById("pnr").value.toUpperCase().trim();
let h = document.getElementById("hasil");

h.innerHTML = `<div class="loading">⏳ Mengecek data...</div>`;

setTimeout(() => {

if(data[pnr]){

let d = data[pnr];
let warna = d.status.includes("Menunggu") ? "orange" : "green";

let html = `
<div class="result">
<div class="grid">
<div><div class="label">Nama</div><div class="value">${d.nama}</div></div>
<div><div class="label">Maskapai</div><div class="value">${d.maskapai}</div></div>
<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Jam</div><div class="value">${d.jam}</div></div>
<div><div class="label">Dari</div><div class="value">${d.dari}</div></div>
<div><div class="label">Ke</div><div class="value">${d.ke}</div></div>
</div>
`;

if(d.penumpang){
html += `<div style="margin-top:10px;"><div class="label">Penumpang</div><div class="value">${d.penumpang.join("<br>")}</div></div>`;
}

if(d.kelas){
html += `<div style="margin-top:10px;"><div class="label">Kelas</div><div class="value">${d.kelas}</div></div>`;
}

if(d.bagasi){
html += `<div style="margin-top:10px;"><div class="label">Bagasi</div><div class="value">${d.bagasi}</div></div>`;
}

if(d.total){
html += `<div style="margin-top:10px;"><div class="label">Total</div><div class="value">${d.total}</div></div>`;
}

html += `<br><div><div class="label">Status</div><span class="badge ${warna}">${d.status}</span></div>`;

// TIMER hanya untuk menunggu
if(d.status.includes("Menunggu")){
html += `
<div class="timer" id="timer">30:00</div>
<div style="margin-top:10px;">
<div class="label">Pembayaran</div>
<div class="value">
BANK BRI<br>
A/N: SUCI RAHMADINI<br>
3700-0101-4122-504<br>
Kode Bank: 002
</div>
</div>`;
setTimeout(startTimer,100);
}

html += `</div>`;
h.innerHTML = html;

}else{
h.innerHTML = `<div class="result" style="color:red;">PNR tidak ditemukan</div>`;
}

}, 800);
}

function startTimer(){
let time = 1800;
timerInterval = setInterval(()=>{
let el = document.getElementById("timer");
if(!el) return;

let m = Math.floor(time/60);
let s = time%60;

el.innerHTML = String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');

if(time<=0){
el.innerHTML="WAKTU HABIS";
el.classList.add("red");
clearInterval(timerInterval);
}

time--;
},1000);
}

</script>

</body>
</html>
