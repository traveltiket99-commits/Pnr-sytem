<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight PNR Checker</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

.box {
    margin:20px;
    padding:20px;
    border-radius:25px;
    background:#111;
    box-shadow:0 0 30px rgba(255,0,0,0.2);
}

.title {
    text-align:center;
    font-size:22px;
    margin-bottom:10px;
}

.desc {
    text-align:center;
    color:#aaa;
    font-size:14px;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    background:#222;
    color:#fff;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:red;
    color:white;
    font-weight:bold;
    font-size:16px;
}

.result {
    margin-top:20px;
    display:none;
    background:#1a1a1a;
    border-radius:20px;
    padding:20px;
}

.row {
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.label {
    font-size:12px;
    color:#aaa;
}

.value {
    font-weight:bold;
}

.route {
    text-align:center;
    margin:15px 0;
    font-size:18px;
}

.status {
    margin-top:15px;
    background:#FFD600;
    color:#000;
    text-align:center;
    padding:12px;
    border-radius:20px;
    font-weight:bold;
}

.timer {
    margin-top:10px;
    text-align:center;
    color:#ff3b30;
    font-size:14px;
}

.info {
    text-align:center;
    font-size:13px;
    color:#aaa;
}

.qr {
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

<div class="title">✈️ Flight PNR Checker</div>

<p class="desc">
Cek status penerbangan Anda dengan mudah menggunakan kode PNR. 
Data yang ditampilkan merupakan data resmi dari sistem penerbangan.
</p>

<input type="text" id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cekPNR()">Cek Status</button>

<div class="result" id="result"></div>

</div>

<script>

// DATABASE
const db = {

"AKTG2N": {
    nama:"Pdt. Selvie Elizabeth Rumagit S.Th",
    maskapai:"TransNusa",
    flight:"8B5889 / 8B5888",
    dari:"Manado (MDC)",
    ke:"Denpasar (DPS)",
    jam:"04:45 - 01:30",
    boarding:"04:00",
    gate:"-",
    seat:"-",
    total:"Rp 2.472.900",

    status:"Menunggu Pembayaran",
    deadlineHour:9
},

"FPVMCW": {
    nama:"Nn. Siti Zahra Al Fauziyani",
    maskapai:"Batik Air",
    flight:"ID-7797",
    dari:"Jakarta (CGK)",
    ke:"Sorong (SOQ)",
    jam:"00:30 - 06:35",
    boarding:"00:00",
    gate:"-",
    seat:"A17",
    total:"Rp 3.029.544",

    status:"Confirmed",
    deadlineHour:0
}

};


// FUNCTION
function cekPNR(){
    let input = document.getElementById("pnr").value.toUpperCase();
    let result = document.getElementById("result");

    if(db[input]){
        let d = db[input];

        result.innerHTML = `
        <div class="row">
            <div>
                <div class="label">Nama</div>
                <div class="value">${d.nama}</div>
            </div>
            <div>
                <div class="label">Maskapai</div>
                <div class="value">${d.maskapai}</div>
            </div>
        </div>

        <div class="route">
            ${d.dari} ✈ ${d.ke}
        </div>

        <div class="row">
            <div>
                <div class="label">Flight</div>
                <div class="value">${d.flight}</div>
            </div>
            <div>
                <div class="label">Jam</div>
                <div class="value">${d.jam}</div>
            </div>
        </div>

        <div class="row">
            <div>
                <div class="label">Gate</div>
                <div class="value">${d.gate}</div>
            </div>
            <div>
                <div class="label">Seat</div>
                <div class="value">${d.seat}</div>
            </div>
        </div>

        <div class="row">
            <div>
                <div class="label">Boarding</div>
                <div class="value">${d.boarding}</div>
            </div>
            <div>
                <div class="label">Total</div>
                <div class="value">${d.total}</div>
            </div>
        </div>

        <div class="status">${d.status === "Confirmed" ? "✔" : "⏳"} ${d.status}</div>

        <div class="timer" id="timer"></div>

        <div class="info">
        ${d.status === "Menunggu Pembayaran" ? "Segera lakukan pembayaran sebelum pukul 09:00 WITA" : ""}
        </div>

        <div class="qr">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${input}">
        </div>
        `;

        result.style.display="block";

        if(d.status === "Menunggu Pembayaran"){
            startDeadlineTimer(d.deadlineHour);
        }

    } else {
        alert("PNR tidak ditemukan");
    }
}


// TIMER
function startDeadlineTimer(deadlineHour){
    const display = document.getElementById("timer");

    const interval = setInterval(() => {
        let now = new Date();
        let wita = new Date(now.getTime() + (8 * 60 * 60 * 1000));

        let target = new Date(wita);
        target.setHours(deadlineHour,0,0,0);

        let diff = Math.floor((target - wita)/1000);

        if(diff <= 0){
            clearInterval(interval);
            display.innerHTML = "❌ Waktu pembayaran habis";
            return;
        }

        let m = Math.floor(diff/60);
        let s = diff % 60;

        display.innerHTML = `⏳ Sisa waktu: ${m}:${s<10?"0"+s:s}`;
    },1000);
}


// AUTO SCAN
const urlParams = new URLSearchParams(window.location.search);
const pnr = urlParams.get('pnr');

if (pnr) {
    document.getElementById("pnr").value = pnr;
    setTimeout(() => cekPNR(), 500);
}

</script>

</body>
</html>
