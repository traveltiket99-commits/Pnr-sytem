<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Kode PNR Semua Maskapai</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f7;
}

/* HEADER */
.header {
  background: black;
  color: gold;
  text-align: center;
  padding: 15px;
  font-weight: bold;
  font-size: 16px;
}

/* CARD */
.card {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 12px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 16px;
  text-transform: uppercase;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: gold;
  color: black;
  border: none;
  font-weight: bold;
}

/* BOARDING PASS */
.ticket {
  margin-top: 20px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.top {
  background: linear-gradient(90deg,#b8860b,#ffd700);
  color: black;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.middle {
  padding: 15px;
  background: #fff;
}

.route {
  display: flex;
  justify-content: space-between;
  font-size: 22px;
  font-weight: bold;
  margin: 10px 0;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

.bottom {
  background: #eee;
  padding: 10px;
  text-align: center;
}

.qr {
  margin-top: 10px;
  text-align: center;
}

.brand {
  text-align: center;
  margin-top: 10px;
  font-size: 12px;
  color: #555;
}
</style>
</head>

<body>

<div class="header">✈️ CEK KODE PNR SEMUA MASKAPAI</div>

<div class="card">
  <h3>Cek Kode PNR</h3>
  <input id="pnr" placeholder="Masukkan Kode PNR">
  <button onclick="cekPNR()">Cek Booking</button>

  <div id="result"></div>
</div>

<script>

// DATA PENUMPANG
const dataPNR = {
  "ABC123": {
    name: "Budi Santoso",
    flight: "JT-610",
    from: "Jakarta",
    to: "Surabaya",
    date: "10 April 2026",
    seat: "12A",
    status: "CONFIRMED"
  }
};

// FUNCTION CEK
function cekPNR() {
  const pnr = document.getElementById("pnr").value.toUpperCase().trim();
  const data = dataPNR[pnr];

  if (data) {
    document.getElementById("result").innerHTML = `
      <div class="ticket">

        <div class="top">
          <div>${data.flight}</div>
          <div>${data.status}</div>
        </div>

        <div class="middle">
          <b>${data.name}</b><br>
          PNR: ${pnr}

          <div class="route">
            <div>${data.from}</div>
            <div>→</div>
            <div>${data.to}</div>
          </div>

          <div class="row">
            <div>Tanggal</div>
            <div>${data.date}</div>
          </div>

          <div class="row">
            <div>Seat</div>
            <div>${data.seat}</div>
          </div>

          <div class="brand">Cek Kode PNR Semua Maskapai</div>

          <div class="qr">
            <canvas id="qrcode"></canvas>
          </div>
        </div>

        <div class="bottom">
          |||||||||||||||||||||||||||||||
        </div>

      </div>
    `;

    // QR CODE
    QRCode.toCanvas(document.getElementById('qrcode'), 
      `${pnr} | ${data.name} | ${data.flight}`, 
      function (error) {
        if (error) console.error(error);
      }
    );

  } else {
    document.getElementById("result").innerHTML =
      "<div class='ticket'>PNR tidak ditemukan</div>";
  }
}

</script>

</body>
</html>
