<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cek Booking Tiket</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #2c2c2c, #4b4b4b);
      color: #333;
      text-align: center;
      padding: 40px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease-in-out;
    }

    h2 {
      color: #444;
      margin-bottom: 20px;
    }

    input {
      width: 85%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #888;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }

    button {
      padding: 12px 25px;
      background: #444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    button:hover {
      background: #222;
    }

    .result {
      margin-top: 25px;
      text-align: left;
    }

    .card {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      border-left: 6px solid #999;
      animation: slideUp 0.4s ease;
    }

    .confirmed {
      border-left-color: #28a745;
    }

    .pending {
      border-left-color: #ffc107;
    }

    .status {
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .status.confirmed {
      background: #e6ffed;
      color: #28a745;
    }

    .status.pending {
      background: #fff8e1;
      color: #b8860b;
    }

    .error {
      color: red;
      font-weight: bold;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px);}
      to { opacity: 1; transform: translateY(0);}
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>

<div class="container">
  <h2>✈️ Cek Kode Booking</h2>

  <input type="text" id="pnrInput" placeholder="Masukkan Kode Booking">
  <br>
  <button onclick="cekPNR()">Cek Sekarang</button>

  <div class="result" id="result"></div>
</div>

<script>
const database = [
  {
    pnr: "FPVMCW",
    status: "confirmed",
    flight: "JT-664",
    from: "Yogyakarta (YIA)",
    to: "Makassar (UPG)",
    departure: "08 Apr 2026 - 20:00",
    arrival: "08 Apr 2026 - 22:55",
    passengers: [
      { name: "Achmad Fachruddin", seat: "A17", ticket: "99990183059" },
      { name: "Fajriah M", seat: "B17", ticket: "999901256749" }
    ]
  },
  {
    pnr: "PAY123",
    status: "pending",
    flight: "JT-720",
    from: "Jakarta (CGK)",
    to: "Bali (DPS)",
    departure: "10 Apr 2026 - 09:00",
    arrival: "10 Apr 2026 - 11:45",
    passengers: [
      { name: "Budi Santoso", seat: "C12", ticket: "888777666" }
    ]
  }
];

function cekPNR() {
  const input = document.getElementById("pnrInput").value.toUpperCase();
  const resultDiv = document.getElementById("result");

  const data = database.find(b => b.pnr === input);

  if (data) {
    let statusText = data.status === "confirmed" ? "Confirmed" : "Menunggu Pembayaran";
    let statusClass = data.status === "confirmed" ? "confirmed" : "pending";

    let html = `
      <div class="card ${statusClass}">
        <div class="status ${statusClass}">${statusText}</div>

        <p><b>PNR:</b> ${data.pnr}</p>
        <p><b>Flight:</b> ${data.flight}</p>
        <p><b>Rute:</b> ${data.from} → ${data.to}</p>
        <p><b>Berangkat:</b> ${data.departure}</p>
        <p><b>Tiba:</b> ${data.arrival}</p>

        <h4>Penumpang:</h4>
    `;

    data.passengers.forEach(p => {
      html += `
        <p>
          ${p.name}<br>
          Seat: ${p.seat}<br>
          Ticket: ${p.ticket}
        </p>
      `;
    });

    html += `</div>`;
    resultDiv.innerHTML = html;

  } else {
    resultDiv.innerHTML = "<p class='error'>Kode booking tidak ditemukan!</p>";
  }
}
</script>

</body>
</html>
