<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cek Booking Tiket</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f1f1;
      text-align: center;
      padding: 40px;
    }

    .container {
      max-width: 520px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    button {
      padding: 12px 25px;
      background: #e60023;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .result {
      margin-top: 25px;
      text-align: left;
    }

    .card {
      background: #fafafa;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      border-left: 5px solid #ccc;
    }

    .confirmed {
      border-left-color: green;
    }

    .pending {
      border-left-color: orange;
    }

    .status {
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .status.confirmed {
      background: #e6ffe6;
      color: green;
    }

    .status.pending {
      background: #fff3cd;
      color: #856404;
    }

    .error {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🔍 Cek Kode Booking</h2>
  <input type="text" id="pnrInput" placeholder="Masukkan Kode Booking (PNR)">
  <br>
  <button onclick="cekPNR()">Cek</button>

  <div class="result" id="result"></div>
</div>

<script>
/* =========================
   DATABASE MULTI DATA
========================= */
const database = [
  {
    pnr: "FPVMCW",
    status: "confirmed",
    flight: "JT-664",
    from: "Yogyakarta (YIA)",
    to: "Makassar (UPG)",
    departure: "08 Apr 2026 - 20:00",
    arrival: "08 Apr 2026 - 22:55",
    passengers: [
      { name: "Achmad Fachruddin", seat: "A17", ticket: "99990183059" },
      { name: "Fajriah M", seat: "B17", ticket: "999901256749" }
    ]
  },
  {
    pnr: "PAY123",
    status: "pending",
    flight: "JT-720",
    from: "Jakarta (CGK)",
    to: "Bali (DPS)",
    departure: "10 Apr 2026 - 09:00",
    arrival: "10 Apr 2026 - 11:45",
    passengers: [
      { name: "Budi Santoso", seat: "C12", ticket: "888777666" }
    ]
  }
];

/* =========================
   FUNCTION CEK PNR
========================= */
function cekPNR() {
  const input = document.getElementById("pnrInput").value.toUpperCase();
  const resultDiv = document.getElementById("result");

  const data = database.find(b => b.pnr === input);

  if (data) {
    let statusText = data.status === "confirmed" ? "Confirmed" : "Menunggu Pembayaran";
    let statusClass = data.status === "confirmed" ? "confirmed" : "pending";

    let html = `
      <div class="card ${statusClass}">
        <div class="status ${statusClass}">${statusText}</div>

        <p><b>Flight:</b> ${data.flight}</p>
        <p><b>Rute:</b> ${data.from} → ${data.to}</p>
        <p><b>Berangkat:</b> ${data.departure}</p>
        <p><b>Tiba:</b> ${data.arrival}</p>

        <h4>Penumpang:</h4>
    `;

    data.passengers.forEach(p => {
      html += `
        <p>
          ${p.name}<br>
          Seat: ${p.seat}<br>
          Ticket: ${p.ticket}
        </p>
      `;
    });

    html += `</div>`;
    resultDiv.innerHTML = html;

  } else {
    resultDiv.innerHTML = "<p class='error'>Kode booking tidak ditemukan!</p>";
  }
}
</script>

</body>
</html>
