<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Tiket Pesawat</title>

<style>
body {
    margin: 0;
    font-family: Arial;

    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1504198453319-5ce911bafcde');

    background-size: cover;
    color: white;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 350px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: red;
    color: white;
    font-weight: bold;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>✈️ Cek Tiket</h2>

<input id="pnr" placeholder="Masukkan kode booking">
<button onclick="cek()">Cek</button>

<div id="hasil"></div>

</div>
</div>

<script>

const data = {

"JQKZUE": {
nama: "Ny. Tiara Monova",
maskapai: "Super Air Jet",
flight: "IU-960",
dari: "Batam (BTH)",
ke: "Siborong-borong (DTB)",
jam: "10:20",
status: "Confirmed"
}

};

function cek(){

let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

if(data[pnr]){
let d = data[pnr];

h.innerHTML = `
<div class="result">
<b>Nama:</b> ${d.nama}<br>
<b>Maskapai:</b> ${d.maskapai}<br>
<b>Flight:</b> ${d.flight}<br>
<b>Dari:</b> ${d.dari}<br>
<b>Ke:</b> ${d.ke}<br>
<b>Jam:</b> ${d.jam}<br>
<b>Status:</b> ${d.status}
</div>
`;

}else{
h.innerHTML = `<div class="result" style="color:red;">PNR tidak ditemukan</div>`;
}

}

</script>

</body>
</html>
